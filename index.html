<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BRQ CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: radial-gradient(circle at 30% 20%, #0f1128, #03051a);
        }

        .app-container {
            width: 100%;
            max-width: 550px;
            height: 90vh;
            max-height: 800px;
            background: rgba(8, 12, 28, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(176, 126, 255, 0.15);
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .content-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .content-scroll::-webkit-scrollbar-thumb {
            background: #8c6eff;
            border-radius: 10px;
        }

        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: rgba(20, 24, 50, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            max-width: 360px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(140, 100, 255, 0.3);
            animation: fadeSlideUp 0.5s ease;
        }
        .brand-horror {
            font-family: 'Creepster', cursive;
            font-size: 3.2rem;
            text-align: center;
            background: linear-gradient(135deg, #f0e6ff, #b07eff, #7a5cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(176, 126, 255, 0.3);
            font-weight: 400;
        }
        .video-eye {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #000;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .video-eye video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .input-group input:focus {
            border-color: #b07eff;
            box-shadow: 0 0 0 3px rgba(176, 126, 255, 0.2);
        }
        .input-group input::placeholder {
            color: #b9beff;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }
        .login-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #8c6eff, #c292ff);
        }
        .login-error {
            color: #ffae9e;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .main-app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .bottom-nav {
            background: rgba(15, 18, 40, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 20px 12px;
            border-top: 1px solid rgba(176, 126, 255, 0.35);
            border-radius: 28px 28px 0 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            color: #ccd0ff;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .nav-item i {
            font-size: 1.5rem;
        }
        .nav-item.active {
            color: #dbbaff;
            background: rgba(122, 92, 255, 0.3);
        }
        .nav-item:hover i {
            transform: translateY(-2px);
        }

        /* Home Page - Clean */
        .home-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100%;
        }
        .welcome-card {
            text-align: center;
            background: rgba(20, 24, 50, 0.75);
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 32px;
            margin-bottom: 25px;
            border: 1px solid rgba(176, 126, 255, 0.4);
            width: 100%;
        }
        .welcome-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #dbbaff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            font-family: 'Inter', sans-serif;
        }
        .core-text {
            font-size: 1.3rem;
            font-weight: 500;
            color: #a5a9ce;
            letter-spacing: 2px;
            font-family: 'Creepster', cursive;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .owner-btn {
            width: 100%;
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        .owner-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #8c6eff, #c292ff);
            box-shadow: 0 4px 15px rgba(122, 92, 255, 0.4);
        }

        /* World Clock */
        .world-clock-container {
            max-width: 500px;
            margin: 0 auto;
            max-height: 100%;
            overflow-y: auto;
            padding-right: 4px;
        }
        .world-clock-container::-webkit-scrollbar {
            width: 3px;
        }
        .world-clock-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .world-clock-container::-webkit-scrollbar-thumb {
            background: #b07eff;
            border-radius: 10px;
        }
        .region-section {
            margin-bottom: 24px;
        }
        .region-title {
            font-size: 1rem;
            font-weight: 700;
            color: #dbbaff;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #b07eff;
            letter-spacing: 0.5px;
        }
        .cities-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .city-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 18px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-info {
            flex: 1;
        }
        .city-name {
            font-weight: 700;
            font-size: 1rem;
            color: #f0f2ff;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }
        .city-time {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Inter', monospace;
            letter-spacing: 1px;
        }
        .city-date {
            font-size: 0.65rem;
            color: #a5a9ce;
            margin-top: 3px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(20, 24, 50, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 380px;
            margin: 30px auto;
            border: 1px solid rgba(176, 126, 255, 0.4);
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .setting-row:last-child {
            border-bottom: none;
        }
        .setting-label {
            font-weight: 600;
            color: #f0f2ff;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .version-badge {
            background: #b07eff40;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }
        .changelog-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .changelog-title {
            font-weight: 700;
            color: #dbbaff;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .changelog-list {
            list-style: none;
            padding-left: 8px;
        }
        .changelog-list li {
            color: #ccd0ff;
            font-size: 0.8rem;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .changelog-list li i {
            font-size: 0.7rem;
            color: #7a5cff;
            width: 18px;
        }
        
        .logout-btn {
            width: 100%;
            background: linear-gradient(95deg, rgba(220, 70, 70, 0.85), rgba(180, 50, 50, 0.95));
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        .logout-btn:hover {
            transform: scale(0.98);
        }

        /* Code Scraper */
        .code-scraper-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .scraper-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            margin-bottom: 20px;
        }
        .scraper-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .scraper-badge {
            display: inline-block;
            background: rgba(122, 92, 255, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b07eff;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .scraper-header h3 {
            color: #e2e6ff;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .scraper-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .scraper-url-wrapper {
            flex: 1;
            position: relative;
        }
        .scraper-url-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b07eff;
        }
        .scraper-url-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .scraper-url-input:focus {
            border-color: #b07eff;
        }
        .scraper-btn {
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .scraper-loading {
            margin-top: 15px;
            display: none;
        }
        .scraper-loading-bar {
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            height: 6px;
            overflow: hidden;
        }
        .scraper-loading-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7a5cff, #b07eff);
            border-radius: 50px;
            transition: width 0.3s;
        }
        .scraper-result {
            margin-top: 20px;
            display: none;
        }
        .scraper-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .scraper-result-header span {
            color: #f5e6b0;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .scraper-result-actions {
            display: flex;
            gap: 8px;
        }
        .scraper-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .scraper-action-btn:hover {
            background: rgba(122, 92, 255, 0.5);
        }
        .scraper-pre {
            background: #0a0e1a;
            border-radius: 16px;
            padding: 15px;
            overflow-x: auto;
            max-height: 400px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }
        .scraper-error {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
            padding: 12px;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }
        .scraper-stats {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #a5a9ce;
            font-weight: 500;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 550px) {
            body { padding: 10px; }
            .app-container { height: 95vh; border-radius: 28px; }
            .brand-horror { font-size: 2.5rem; }
            .city-time { font-size: 1.15rem; }
            .city-name { font-size: 0.9rem; }
            .nav-item { padding: 6px 8px; }
            .nav-item i { font-size: 1.3rem; }
            .nav-item span { font-size: 0.6rem; }
            .welcome-text { font-size: 1.3rem; }
            .core-text { font-size: 1.1rem; }
            .scraper-input-group { flex-direction: column; }
            .scraper-btn { padding: 10px; }
        }

        .hidden { display: none !important; }
        
        /* Security Popup */
        .security-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: linear-gradient(135deg, rgba(30, 20, 40, 0.98), rgba(20, 15, 35, 0.98));
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 80, 80, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 50, 50, 0.3);
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        .security-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        .security-popup i {
            font-size: 3rem;
            color: #ff6b6b;
            margin-bottom: 12px;
        }
        .security-popup h3 {
            color: #ff8a8a;
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .security-popup p {
            color: #ccd0ff;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .security-popup button {
            background: linear-gradient(95deg, #ff6b6b, #ff4444);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .security-popup button:hover {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <!-- Security Popup -->
    <div id="securityPopup" class="security-popup">
        <i class="fas fa-shield-alt"></i>
        <h3>Akses Diblokir!</h3>
        <p id="popupMessage">⛔ Fitur ini tidak tersedia untuk keamanan</p>
        <button onclick="closeSecurityPopup()">OK, Saya Mengerti</button>
    </div>

    <div class="app-container" id="appContainer">
        <div id="loginPage" class="login-page">
            <div class="login-card">
                <div class="brand-horror">BRQ CORE</div>
                <div class="video-eye">
                    <video autoplay muted loop playsinline id="eyeVideo">
                        <source src="eye.mp4" type="video/mp4">
                    </video>
                </div>
                <form id="loginForm" action="javascript:void(0);">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                    <div id="loginErrorMsg" class="login-error"></div>
                </form>
            </div>
        </div>

        <div id="mainApp" class="main-app hidden">
            <div class="content-scroll" id="pageContent"></div>
            <div class="bottom-nav">
                <button class="nav-item" id="homeNavBtn"><i class="fas fa-compass"></i><span>Home</span></button>
                <button class="nav-item" id="worldClockNavBtn"><i class="fas fa-globe"></i><span>World Clock</span></button>
                <button class="nav-item" id="codeScraperNavBtn"><i class="fas fa-file-code"></i><span>Code Scraper</span></button>
                <button class="nav-item" id="settingsNavBtn"><i class="fas fa-sliders-h"></i><span>Settings</span></button>
            </div>
        </div>
    </div>

    <script>
        // ============ SECURITY SYSTEM ============
        let popupTimeout;
        
        function showSecurityPopup(message, isLegal = false) {
            if (isLegal) return;
            const popup = document.getElementById('securityPopup');
            const popupMessage = document.getElementById('popupMessage');
            popupMessage.innerHTML = message;
            popup.classList.add('show');
            if (popupTimeout) clearTimeout(popupTimeout);
            popupTimeout = setTimeout(() => {
                popup.classList.remove('show');
            }, 2500);
        }
        
        function closeSecurityPopup() {
            const popup = document.getElementById('securityPopup');
            popup.classList.remove('show');
            if (popupTimeout) clearTimeout(popupTimeout);
        }
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            showSecurityPopup('⛔ Klik kanan tidak diperbolehkan!');
            return false;
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12') {
                e.preventDefault();
                showSecurityPopup('⛔ Dev Tools tidak tersedia!');
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) {
                e.preventDefault();
                showSecurityPopup('⛔ Inspect Element tidak diperbolehkan!');
                return false;
            }
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                showSecurityPopup('⛔ View Source tidak tersedia!');
                return false;
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                showSecurityPopup('⛔ Menyimpan halaman tidak diperbolehkan!');
                return false;
            }
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                showSecurityPopup('⛔ Print halaman tidak tersedia!');
                return false;
            }
            if (e.shiftKey && e.key === 'F10') {
                e.preventDefault();
                showSecurityPopup('⛔ Menu konteks tidak tersedia!');
                return false;
            }
        });
        
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        // ============ APP LOGIC ============
        // KOTA INDONESIA LENGKAP (25+ Kota dari Sabang sampai Merauke)
        const indonesiaCities = [

        let clockInterval;

        const homeBtn = document.getElementById('homeNavBtn');
        const worldClockBtn = document.getElementById('worldClockNavBtn');
        const codeScraperBtn = document.getElementById('codeScraperNavBtn');
        const settingsBtn = document.getElementById('settingsNavBtn');

            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

        function setActiveNavButton(page) {

            else if (page === 'settings') settingsBtn.classList.add('active');

        function loadPage(page) {
            activePage = page;
            if (page === 'home') {
                pageContentDiv.innerHTML = renderHome();
                setActiveNavButton('home');
                document.getElementById('ownerBtn')?.addEventListener('click', () => {
                    window.open('https://brechq.site', '_blank');
                });
            } else if (page === 'worldclock') {
                pageContentDiv.innerHTML = renderWorldClockPage();
                setActiveNavButton('worldclock');
                renderWorldClock();
            } else if (page === 'codescraper') {
                pageContentDiv.innerHTML = `<div class="code-scraper-container"><div class="scraper-card"><div class="scraper-header"><div class="scraper-badge"><i class="fas fa-code"></i> Web Scraper Tool</div><h3><i class="fas fa-file-code"></i> SourceCode Grabber</h3></div><div class="scraper-input-group"><div class="scraper-url-wrapper"><i class="fas fa-link scraper-url-icon"></i><input type="url" id="scraperUrl" class="scraper-url-input" placeholder="https://example.com" value="https://example.com"></div><button class="scraper-btn" id="scraperFetchBtn"><i class="fas fa-magic"></i> Extract</button></div><div class="scraper-loading" id="scraperLoading"><div class="scraper-loading-bar"><div class="scraper-loading-progress" id="scraperProgressBar"></div></div><div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: #a5a9ce;"><span id="scraperMessage">Memulai...</span><span id="scraperPercent">0%</span></div></div><div class="scraper-error" id="scraperError"></div><div class="scraper-result" id="scraperResult"><div class="scraper-result-header"><span><i class="fas fa-code-branch"></i> Source Code</span><div class="scraper-result-actions"><button class="scraper-action-btn" id="scraperCopyBtn"><i class="fas fa-copy"></i> Copy</button><button class="scraper-action-btn" id="scraperDownloadBtn"><i class="fas fa-download"></i> Download</button><button class="scraper-action-btn" id="scraperClearBtn"><i class="fas fa-trash"></i> Clear</button></div></div><pre class="scraper-pre" id="scraperSourceCode"></pre><div class="scraper-stats" id="scraperStats"></div></div></div></div>`;
                setActiveNavButton('codescraper');
                setTimeout(() => {
                    const PROXY_URL = (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`;
                    let currentSourceCode = '';
                    let isFetching = false;
                    let scraperInterval = null;
                    let scraperProgress = 0;
                    
                    function updateScraperProgress(percent, msg) {
                        scraperProgress = percent;
                        const bar = document.getElementById('scraperProgressBar');
                        const percentEl = document.getElementById('scraperPercent');
                        const msgEl = document.getElementById('scraperMessage');
                        if (bar) bar.style.width = percent + '%';
                        if (percentEl) percentEl.textContent = Math.floor(percent) + '%';
                        if (msgEl) msgEl.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${msg}`;
                    }
                    
                    async function fetchSourceCode() {
                        if (isFetching) return;
                        const urlInput = document.getElementById('scraperUrl');
                        let url = urlInput.value.trim();
                        if (!url) { alert('Masukkan URL!'); return; }
                        if (!url.startsWith('http')) url = 'https://' + url;
                        urlInput.value = url;
                        const errorDiv = document.getElementById('scraperError');
                        const resultDiv = document.getElementById('scraperResult');
                        errorDiv.style.display = 'none';
                        resultDiv.style.display = 'none';
                        isFetching = true;
                        document.getElementById('scraperLoading').style.display = 'block';
                        scraperProgress = 0;
                        updateScraperProgress(0, 'Memulai...');
                        if (scraperInterval) clearInterval(scraperInterval);
                        scraperInterval = setInterval(() => {
                            if (scraperProgress < 90 && isFetching) {
                                updateScraperProgress(Math.min(scraperProgress + 5, 90), 'Mengambil data...');
                            }
                        }, 200);
                        try {
                            updateScraperProgress(20, 'Validasi URL...');
                            await new Promise(r => setTimeout(r, 200));
                            const proxyUrl = PROXY_URL(url);
                            const response = await fetch(proxyUrl);
                            updateScraperProgress(70, 'Menerima response...');
                            if (!response.ok) throw new Error(`HTTP ${response.status}`);
                            const html = await response.text();
                            updateScraperProgress(90, 'Memproses...');
                            if (!html || html.length < 50) throw new Error('Source code kosong');
                            currentSourceCode = html;
                            document.getElementById('scraperSourceCode').textContent = html;
                            document.getElementById('scraperStats').innerHTML = `<i class="fas fa-database"></i> Ukuran: ${(html.length/1024).toFixed(2)} KB | <i class="fas fa-code"></i> Karakter: ${html.length.toLocaleString()}`;
                            resultDiv.style.display = 'block';
                            updateScraperProgress(100, 'Selesai!');
                            setTimeout(() => { document.getElementById('scraperLoading').style.display = 'none'; }, 500);
                        } catch(err) {
                            document.getElementById('scraperLoading').style.display = 'none';
                            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Gagal: ${err.message}`;
                            errorDiv.style.display = 'block';
                        } finally {
                            isFetching = false;
                            if (scraperInterval) clearInterval(scraperInterval);
                        }
                    }
                    
                    function copyScraperCode() {
                        if (!currentSourceCode) { alert('Tidak ada source code!'); return; }
                        navigator.clipboard.writeText(currentSourceCode);
                        alert('Copied!');
                    }
                    function downloadScraperCode() {
                        if (!currentSourceCode) { alert('Tidak ada source code!'); return; }
                        const blob = new Blob([currentSourceCode], { type: 'text/html' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `source_${Date.now()}.html`;
                        a.click();
                        URL.revokeObjectURL(a.href);
                        alert('Download dimulai');
                    }
                    function clearScraperCode() {
                        currentSourceCode = '';
                        document.getElementById('scraperUrl').value = '';
                        document.getElementById('scraperResult').style.display = 'none';
                        document.getElementById('scraperError').style.display = 'none';
                        alert('Dibersihkan');
                    }
                    document.getElementById('scraperFetchBtn')?.addEventListener('click', fetchSourceCode);
                    document.getElementById('scraperCopyBtn')?.addEventListener('click', copyScraperCode);
                    document.getElementById('scraperDownloadBtn')?.addEventListener('click', downloadScraperCode);
                    document.getElementById('scraperClearBtn')?.addEventListener('click', clearScraperCode);
                    document.getElementById('scraperUrl')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') fetchSourceCode(); });
                }, 100);
            } else if (page === 'settings') {
                pageContentDiv.innerHTML = renderSettings();
                setActiveNavButton('settings');
                document.getElementById('logoutButton')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            }
            if (pageContentDiv) pageContentDiv.scrollTop = 0;
        }
        
        homeBtn.addEventListener('click', () => { if (activePage !== 'home') loadPage('home'); });
        worldClockBtn.addEventListener('click', () => { if (activePage !== 'worldclock') loadPage('worldclock'); });
        codeScraperBtn.addEventListener('click', () => { if (activePage !== 'codescraper') loadPage('codescraper'); });
        settingsBtn.addEventListener('click', () => { if (activePage !== 'settings') loadPage('settings'); });
        
        document.getElementById('eyeVideo')?.addEventListener('error', function() { this.style.background = "#11152e"; });
        document.getElementById('eyeVideo')?.play().catch(() => {});
        
        console.log("%c🚫 BRQ CORE - Protected", "color: #b07eff; font-size: 14px; font-weight: bold;");
    </script>
