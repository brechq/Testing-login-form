<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BRQ CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: radial-gradient(circle at 30% 20%, #0f1128, #03051a);
            position: relative;
        }

        /* Animated background pattern */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(122, 92, 255, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: bgMove 40s linear infinite;
            pointer-events: none;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .app-container {
            width: 100%;
            max-width: 550px;
            height: 90vh;
            max-height: 800px;
            background: rgba(8, 12, 28, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 44px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(176, 126, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .content-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .content-scroll::-webkit-scrollbar-thumb {
            background: #8c6eff;
            border-radius: 10px;
        }

        /* Login Page */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: rgba(20, 24, 50, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 32px 28px;
            width: 100%;
            max-width: 360px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(140, 100, 255, 0.3);
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }
        .brand-horror {
            font-family: 'Creepster', cursive;
            font-size: 3.2rem;
            text-align: center;
            background: linear-gradient(135deg, #f0e6ff, #b07eff, #7a5cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(176, 126, 255, 0.3);
            font-weight: 400;
            transition: all 0.3s ease;
        }
        .video-eye {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .video-eye:hover {
            transform: scale(1.02);
        }
        .video-eye video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #ffffff;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .input-group input:focus {
            border-color: #b07eff;
            box-shadow: 0 0 0 3px rgba(176, 126, 255, 0.2);
            transform: scale(1.01);
        }
        .input-group input::placeholder {
            color: #b9beff;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .login-btn:hover::before {
            left: 100%;
        }
        .login-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #8c6eff, #c292ff);
            box-shadow: 0 8px 20px rgba(122, 92, 255, 0.4);
        }
        .login-error {
            color: #ffae9e;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .main-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeInScale 0.5s ease;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .bottom-nav {
            background: rgba(15, 18, 40, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px 14px;
            border-top: 1px solid rgba(176, 126, 255, 0.35);
            border-radius: 32px 32px 0 0;
            transition: all 0.3s ease;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            color: #ccd0ff;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }
        .nav-item i {
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }
        .nav-item.active {
            color: #dbbaff;
            background: rgba(122, 92, 255, 0.3);
            transform: translateY(-2px);
        }
        .nav-item:hover i {
            transform: translateY(-3px) scale(1.1);
        }

        /* Home Page */
        .home-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100%;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-card {
            text-align: center;
            background: rgba(20, 24, 50, 0.75);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 32px;
            margin-bottom: 20px;
            border: 1px solid rgba(176, 126, 255, 0.4);
            transition: all 0.3s ease;
        }
        .welcome-card:hover {
            transform: translateY(-3px);
            border-color: rgba(176, 126, 255, 0.7);
        }
        .welcome-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #dbbaff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }
        .core-text {
            font-size: 1.3rem;
            font-weight: 500;
            color: #a5a9ce;
            letter-spacing: 2px;
            font-family: 'Creepster', cursive;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .video-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-3px);
            border-color: rgba(176, 126, 255, 0.6);
        }
        .video-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .video-wrapper video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        .owner-btn {
            width: 100%;
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .owner-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .owner-btn:hover::before {
            left: 100%;
        }
        .owner-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #8c6eff, #c292ff);
            box-shadow: 0 8px 20px rgba(122, 92, 255, 0.4);
        }

        /* World Clock */
        .world-clock-container {
            max-width: 500px;
            margin: 0 auto;
            max-height: 100%;
            overflow-y: auto;
            padding-right: 4px;
        }
        .world-clock-container::-webkit-scrollbar {
            width: 3px;
        }
        .world-clock-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .world-clock-container::-webkit-scrollbar-thumb {
            background: #b07eff;
            border-radius: 10px;
        }
        .region-section {
            margin-bottom: 24px;
        }
        .region-title {
            font-size: 1rem;
            font-weight: 700;
            color: #dbbaff;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #b07eff;
            letter-spacing: 0.5px;
        }
        .cities-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .city-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 18px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-card:hover {
            transform: translateX(5px);
            border-color: rgba(176, 126, 255, 0.6);
        }
        .city-info {
            flex: 1;
        }
        .city-name {
            font-weight: 700;
            font-size: 1rem;
            color: #f0f2ff;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }
        .city-time {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Inter', monospace;
            letter-spacing: 1px;
        }
        .city-date {
            font-size: 0.65rem;
            color: #a5a9ce;
            margin-top: 3px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(20, 24, 50, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 380px;
            margin: 30px auto;
            border: 1px solid rgba(176, 126, 255, 0.4);
            transition: all 0.3s ease;
        }
        .settings-panel:hover {
            transform: translateY(-3px);
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .setting-label {
            font-weight: 600;
            color: #f0f2ff;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .version-badge {
            background: #b07eff40;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .changelog-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .changelog-title {
            font-weight: 700;
            color: #dbbaff;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .changelog-list {
            list-style: none;
            padding-left: 8px;
        }
        .changelog-list li {
            color: #ccd0ff;
            font-size: 0.8rem;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .changelog-list li i {
            font-size: 0.7rem;
            color: #7a5cff;
            width: 18px;
        }
        .logout-btn {
            width: 100%;
            background: linear-gradient(95deg, rgba(220, 70, 70, 0.85), rgba(180, 50, 50, 0.95));
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .logout-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .logout-btn:hover::before {
            left: 100%;
        }
        .logout-btn:hover {
            transform: scale(0.98);
        }

        /* Code Scraper */
        .code-scraper-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .scraper-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .scraper-card:hover {
            transform: translateY(-3px);
        }
        .scraper-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .scraper-badge {
            display: inline-block;
            background: rgba(122, 92, 255, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b07eff;
            margin-bottom: 12px;
        }
        .scraper-header h3 {
            color: #e2e6ff;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .scraper-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .scraper-url-wrapper {
            flex: 1;
            position: relative;
        }
        .scraper-url-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b07eff;
        }
        .scraper-url-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .scraper-url-input:focus {
            border-color: #b07eff;
            transform: scale(1.01);
        }
        .scraper-btn {
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .scraper-btn:hover {
            transform: scale(0.96);
        }
        .scraper-result {
            margin-top: 20px;
            display: none;
        }
        .scraper-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .scraper-result-header span {
            color: #f5e6b0;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .scraper-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .scraper-action-btn:hover {
            background: rgba(122, 92, 255, 0.5);
            transform: scale(1.05);
        }
        .scraper-pre {
            background: #0a0e1a;
            border-radius: 16px;
            padding: 15px;
            overflow-x: auto;
            max-height: 400px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        /* Custom Notification - Lebih Terang */
        .custom-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, rgba(40, 35, 70, 0.98), rgba(30, 28, 60, 0.98));
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 10001;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            visibility: hidden;
            border: 1px solid rgba(176, 126, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(176, 126, 255, 0.3);
        }
        .custom-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }
        .custom-notification i {
            font-size: 1.3rem;
        }
        .custom-notification span {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        /* Security Popup */
        .security-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: linear-gradient(135deg, rgba(30, 20, 40, 0.98), rgba(20, 15, 35, 0.98));
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(255, 80, 80, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .security-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .security-popup button {
            background: linear-gradient(95deg, #ff6b6b, #ff4444);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div id="securityPopup" class="security-popup">
        <i class="fas fa-shield-alt"></i>
        <h3>Akses Diblokir!</h3>
        <p id="popupMessage">⛔ Fitur ini tidak tersedia</p>
        <button onclick="closeSecurityPopup()">OK</button>
    </div>
    <div id="customNotification" class="custom-notification">
        <i id="notificationIcon" class="fas fa-check-circle" style="color: #4ade80;"></i>
        <span id="notificationMessage">Berhasil!</span>
    </div>

    <div class="app-container" id="appContainer">
        <div id="loginPage" class="login-page">
            <div class="login-card">
                <div class="brand-horror">BRQ CORE</div>
                <div class="video-eye">
                    <video autoplay muted loop playsinline id="eyeVideo">
                        <source src="eye.mp4" type="video/mp4">
                    </video>
                </div>
                <form id="loginForm" action="javascript:void(0);">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password">
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                    <div id="loginErrorMsg" class="login-error"></div>
                </form>
            </div>
        </div>
        <div id="mainApp" class="main-app hidden">
            <div class="content-scroll" id="pageContent"></div>
            <div class="bottom-nav">
                <button class="nav-item" id="homeNavBtn"><i class="fas fa-compass"></i><span>Home</span></button>
                <button class="nav-item" id="worldClockNavBtn"><i class="fas fa-globe"></i><span>World Clock</span></button>
                <button class="nav-item" id="codeScraperNavBtn"><i class="fas fa-file-code"></i><span>Code Scraper</span></button>
                <button class="nav-item" id="settingsNavBtn"><i class="fas fa-sliders-h"></i><span>Settings</span></button>
            </div>
        </div>
    </div>

    <script>
        // Notification - lebih terang
        function showNotification(msg, type = 'success') {
            const notif = document.getElementById('customNotification');
            const icon = document.getElementById('notificationIcon');
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#4ade80';
            } else if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle';
                icon.style.color = '#f87171';
            } else {
                icon.className = 'fas fa-info-circle';
                icon.style.color = '#b07eff';
            }
            document.getElementById('notificationMessage').textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 2500);
        }

        // Security
        let popupTimeout;
        function showSecurityPopup(msg) {
            const popup = document.getElementById('securityPopup');
            document.getElementById('popupMessage').innerHTML = msg;
            popup.classList.add('show');
            if (popupTimeout) clearTimeout(popupTimeout);
            popupTimeout = setTimeout(() => popup.classList.remove('show'), 2500);
        }
        function closeSecurityPopup() { document.getElementById('securityPopup').classList.remove('show'); }

        document.addEventListener('contextmenu', e => { e.preventDefault(); showSecurityPopup('⛔ Klik kanan tidak diperbolehkan!'); });
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'p') || (e.shiftKey && e.key === 'F10')) {
                e.preventDefault();
                showSecurityPopup('⛔ Fitur ini diblokir untuk keamanan!');
            }
        });
        document.addEventListener('dragstart', e => e.preventDefault());

        // Data
        const indonesiaCities = [
            "Sabang","Banda Aceh","Medan","Padang","Pekanbaru","Batam","Palembang","Bengkulu","Bandar Lampung",
            "Jakarta","Bandung","Semarang","Yogyakarta","Surabaya","Malang","Banyuwangi","Denpasar","Mataram",
            "Kupang","Pontianak","Palangkaraya","Banjarmasin","Balikpapan","Samarinda","Manado","Palu","Makassar",
            "Kendari","Gorontalo","Ambon","Ternate","Sorong","Manokwari","Jayapura","Merauke"
        ];
        const internationalCountries = ["Amerika Serikat","Inggris","Jepang","Australia","Uni Emirat Arab","China","Singapura","Malaysia","Thailand","Korea Selatan","India","Prancis","Jerman","Italia","Spanyol","Belanda"];
        
        function getTime(tz) { try { return new Date().toLocaleTimeString('id-ID', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch(e) { return new Date().toLocaleTimeString('id-ID'); } }
        function getDate(tz) { try { return new Date().toLocaleDateString('id-ID', { timeZone: tz, weekday:'short', day:'numeric', month:'short' }); } catch(e) { return new Date().toLocaleDateString('id-ID'); } }
        
        // UI Functions
        function renderHome() {
            return `<div class="home-container"><div class="welcome-card"><div class="welcome-text">Welcome, Admin!</div><div class="core-text">BRQ CORE</div></div><div class="video-card"><div class="video-wrapper"><video autoplay muted loop playsinline id="homeVideo"><source src="eye2.mp4" type="video/mp4"></video></div></div><button class="owner-btn" id="ownerBtn"><i class="fas fa-user-cog"></i> Owner Social Media</button></div>`;
        }
        
        function renderWorldClockPage() { return `<div class="world-clock-container" id="worldClockContainer"></div>`; }
        function renderWorldClock() {
            let html = `<div class="region-section"><div class="region-title"><i class="fas fa-map-marker-alt"></i> 🇮🇩 Indonesia</div><div class="cities-list">`;
            indonesiaCities.forEach(c => { html += `<div class="city-card"><div class="city-info"><div class="city-name">📍 ${c}</div><div class="city-time">${getTime('Asia/Jakarta')}</div><div class="city-date">${getDate('Asia/Jakarta')}</div></div></div>`; });
            html += `</div></div><div class="region-section"><div class="region-title"><i class="fas fa-globe-asia"></i> 🌏 Luar Negeri</div><div class="cities-list">`;
            internationalCountries.forEach(c => { html += `<div class="city-card"><div class="city-info"><div class="city-name">🌏 ${c}</div><div class="city-time">${getTime('Asia/Jakarta')}</div><div class="city-date">${getDate('Asia/Jakarta')}</div></div></div>`; });
            html += `</div></div>`;
            document.getElementById('worldClockContainer').innerHTML = html;
        }
        
        function renderSettings() {
            return `<div class="settings-panel"><div class="setting-row"><span class="setting-label">Versi aplikasi</span><span class="version-badge">1.6</span></div><div class="changelog-section"><div class="changelog-title"><i class="fas fa-history"></i> Changelog v1.6</div><ul class="changelog-list"><li><i class="fas fa-video"></i> Video eye2.mp4 di halaman Home</li><li><i class="fas fa-bell"></i> Custom notifikasi modern & lebih terang</li><li><i class="fas fa-city"></i> 35+ kota Indonesia lengkap</li><li><i class="fas fa-shield-alt"></i> Sistem keamanan anti-inspect</li><li><i class="fas fa-smooth"></i> UI lebih smooth & animasi halus</li><li><i class="fas fa-check-circle"></i> Notifikasi login berhasil lebih jelas</li></ul></div><div class="setting-row" style="border-bottom: none; padding-top: 20px;"><button id="logoutButton" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>`;
        }

        function renderCodeScraperPage() {
            return `<div class="code-scraper-container"><div class="scraper-card"><div class="scraper-header"><div class="scraper-badge"><i class="fas fa-code"></i> Web Scraper Tool</div><h3><i class="fas fa-file-code"></i> SourceCode Grabber</h3></div><div class="scraper-input-group"><div class="scraper-url-wrapper"><i class="fas fa-link scraper-url-icon"></i><input type="url" id="scraperUrl" class="scraper-url-input" placeholder="https://example.com" value="https://example.com"></div><button class="scraper-btn" id="scraperFetchBtn"><i class="fas fa-magic"></i> Extract</button></div><div class="scraper-loading" id="scraperLoading" style="display:none;"><div class="scraper-loading-bar"><div class="scraper-loading-progress" id="scraperProgressBar"></div></div><div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: #a5a9ce;"><span id="scraperMessage">Memulai...</span><span id="scraperPercent">0%</span></div></div><div class="scraper-error" id="scraperError" style="display:none;"></div><div class="scraper-result" id="scraperResult" style="display:none;"><div class="scraper-result-header"><span><i class="fas fa-code-branch"></i> Source Code</span><div class="scraper-result-actions"><button class="scraper-action-btn" id="scraperCopyBtn"><i class="fas fa-copy"></i> Copy</button><button class="scraper-action-btn" id="scraperDownloadBtn"><i class="fas fa-download"></i> Download</button><button class="scraper-action-btn" id="scraperClearBtn"><i class="fas fa-trash"></i> Clear</button></div></div><pre class="scraper-pre" id="scraperSourceCode"></pre><div class="scraper-stats" id="scraperStats"></div></div></div></div>`;
        }
        
        function initCodeScraper() {
            const PROXY_URL = (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`;
            let currentSource = '', isFetching = false;
            const fetchBtn = document.getElementById('scraperFetchBtn');
            if (!fetchBtn) return;
            fetchBtn.onclick = async () => {
                if (isFetching) return;
                let url = document.getElementById('scraperUrl').value.trim();
                if (!url) { showNotification('Masukkan URL!', 'error'); return; }
                if (!url.startsWith('http')) url = 'https://' + url;
                document.getElementById('scraperUrl').value = url;
                document.getElementById('scraperError').style.display = 'none';
                document.getElementById('scraperResult').style.display = 'none';
                document.getElementById('scraperLoading').style.display = 'block';
                isFetching = true;
                try {
                    const response = await fetch(PROXY_URL(url));
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const html = await response.text();
                    currentSource = html;
                    document.getElementById('scraperSourceCode').textContent = html;
                    document.getElementById('scraperStats').innerHTML = `<i class="fas fa-database"></i> Ukuran: ${(html.length/1024).toFixed(2)} KB | <i class="fas fa-code"></i> Karakter: ${html.length.toLocaleString()}`;
                    document.getElementById('scraperResult').style.display = 'block';
                    showNotification('Berhasil mengambil source code!', 'success');
                } catch(err) {
                    document.getElementById('scraperError').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Gagal: ${err.message}`;
                    document.getElementById('scraperError').style.display = 'block';
                    showNotification(`Gagal: ${err.message}`, 'error');
                } finally {
                    document.getElementById('scraperLoading').style.display = 'none';
                    isFetching = false;
                }
            };
            document.getElementById('scraperCopyBtn').onclick = () => { if(currentSource) { navigator.clipboard.writeText(currentSource); showNotification('Copied!', 'success'); } else showNotification('Tidak ada source code!', 'error'); };
            document.getElementById('scraperDownloadBtn').onclick = () => { if(currentSource) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([currentSource], {type:'text/html'})); a.download = `source_${Date.now()}.html`; a.click(); showNotification('Download dimulai', 'success'); } else showNotification('Tidak ada source code!', 'error'); };
            document.getElementById('scraperClearBtn').onclick = () => { currentSource = ''; document.getElementById('scraperUrl').value = ''; document.getElementById('scraperResult').style.display = 'none'; document.getElementById('scraperError').style.display = 'none'; showNotification('Dibersihkan', 'info'); };
        }

        let clockInterval, activePage = 'home';
        function startClockUpdate() { if (clockInterval) clearInterval(clockInterval); clockInterval = setInterval(() => { if (activePage === 'worldclock') renderWorldClock(); }, 1000); }
        
        const loginPage = document.getElementById('loginPage'), mainApp = document.getElementById('mainApp'), pageContent = document.getElementById('pageContent');
        const homeBtn = document.getElementById('homeNavBtn'), worldBtn = document.getElementById('worldClockNavBtn'), codeBtn = document.getElementById('codeScraperNavBtn'), settingsBtn = document.getElementById('settingsNavBtn');
        
        function doLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (user === "admin" && pass === "1234") {
                document.getElementById('loginErrorMsg').innerText = '';
                loginPage.classList.add('hidden');
                mainApp.classList.remove('hidden');
                startClockUpdate();
                loadPage('home');
                showNotification('✅ Login berhasil! Selamat datang, Admin.', 'success');
            } else {
                document.getElementById('loginErrorMsg').innerText = "Username atau password salah!";
                showNotification('❌ Login gagal! Username atau password salah.', 'error');
            }
        }
        document.getElementById('loginForm').addEventListener('submit', (e) => { e.preventDefault(); doLogin(); });
        
        function logout() {
            if (clockInterval) clearInterval(clockInterval);
            mainApp.classList.add('hidden');
            loginPage.classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginErrorMsg').innerText = '';
            document.getElementById('eyeVideo')?.play().catch(() => {});
            showNotification('👋 Anda telah logout', 'info');
        }
        
        function setActive(page) {
            [homeBtn, worldBtn, codeBtn, settingsBtn].forEach(btn => btn.classList.remove('active'));
            if (page === 'home') homeBtn.classList.add('active');
            else if (page === 'worldclock') worldBtn.classList.add('active');
            else if (page === 'codescraper') codeBtn.classList.add('active');
            else if (page === 'settings') settingsBtn.classList.add('active');
        }
        
        function loadPage(page) {
            activePage = page;
            if (page === 'home') {
                pageContent.innerHTML = renderHome();
                setActive('home');
                setTimeout(() => { const v = document.getElementById('homeVideo'); if(v) v.play().catch(()=>{}); }, 100);
                document.getElementById('ownerBtn')?.addEventListener('click', () => { window.open('https://brechq.site', '_blank'); showNotification('🌐 Membuka website Owner', 'info'); });
            } else if (page === 'worldclock') {
                pageContent.innerHTML = renderWorldClockPage();
                setActive('worldclock');
                renderWorldClock();
            } else if (page === 'codescraper') {
                pageContent.innerHTML = renderCodeScraperPage();
                setActive('codescraper');
                setTimeout(initCodeScraper, 100);
            } else if (page === 'settings') {
                pageContent.innerHTML = renderSettings();
                setActive('settings');
                document.getElementById('logoutButton')?.addEventListener('click', logout);
            }
            pageContent.scrollTop = 0;
        }
        
        homeBtn.onclick = () => { if (activePage !== 'home') loadPage('home'); };
        worldBtn.onclick = () => { if (activePage !== 'worldclock') loadPage('worldclock'); };
        codeBtn.onclick = () => { if (activePage !== 'codescraper') loadPage('codescraper'); };
        settingsBtn.onclick = () => { if (activePage !== 'settings') loadPage('settings'); };
        
        document.getElementById('eyeVideo')?.addEventListener('error', function() { this.style.background = "#11152e"; });
        document.getElementById('eyeVideo')?.play().catch(() => {});
        
        console.log("%c🔒 BRQ CORE v1.6 - Protected", "color: #b07eff; font-size: 14px; font-weight: bold;");
    </script>
</body>
</html>
