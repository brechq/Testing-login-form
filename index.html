<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BRQ Hub</title>
    <!-- Fonts: Creepster + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ANIMASI BACKGROUND BERGERAK SMOOTH - WAVE EFFECT */
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Wave Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f1128, #03051a);
        }

        .wave-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(122, 92, 255, 0.08), rgba(176, 126, 255, 0.05));
            border-radius: 50%;
            animation: waveMove 20s ease-in-out infinite;
        }

        .wave:nth-child(1) {
            width: 120%;
            height: 120%;
            bottom: -10%;
            left: -10%;
            background: radial-gradient(circle at 30% 40%, rgba(122, 92, 255, 0.12), rgba(176, 126, 255, 0.03));
            animation: waveDrift 25s ease-in-out infinite;
        }

        .wave:nth-child(2) {
            width: 150%;
            height: 150%;
            bottom: -25%;
            left: -25%;
            background: radial-gradient(circle at 70% 60%, rgba(100, 80, 220, 0.1), rgba(200, 150, 255, 0.02));
            animation: waveDriftSlow 35s ease-in-out infinite;
        }

        .wave:nth-child(3) {
            width: 180%;
            height: 180%;
            bottom: -40%;
            left: -40%;
            background: radial-gradient(circle at 50% 50%, rgba(80, 60, 200, 0.08), rgba(150, 100, 255, 0.02));
            animation: waveFloat 30s ease-in-out infinite;
        }

        @keyframes waveMove {
            0% { transform: translate(0%, 0%) rotate(0deg); }
            50% { transform: translate(2%, 3%) rotate(2deg); }
            100% { transform: translate(0%, 0%) rotate(0deg); }
        }

        @keyframes waveDrift {
            0% { transform: translate(0%, 0%) scale(1); }
            33% { transform: translate(3%, -2%) scale(1.05); }
            66% { transform: translate(-2%, 1%) scale(0.98); }
            100% { transform: translate(0%, 0%) scale(1); }
        }

        @keyframes waveDriftSlow {
            0% { transform: translate(0%, 0%) rotate(0deg); }
            50% { transform: translate(-3%, 2%) rotate(3deg); }
            100% { transform: translate(0%, 0%) rotate(0deg); }
        }

        @keyframes waveFloat {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.8; }
            50% { transform: translate(2%, -3%) scale(1.08); opacity: 1; }
            100% { transform: translate(0%, 0%) scale(1); opacity: 0.8; }
        }

        /* Container utama */
        .app-container {
            width: 100%;
            max-width: 550px;
            height: 90vh;
            max-height: 800px;
            background: rgba(8, 12, 28, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.4s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(176, 126, 255, 0.15);
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        .content-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .content-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .content-scroll::-webkit-scrollbar-thumb {
            background: #8c6eff;
            border-radius: 10px;
        }

        /* Login Page */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: rgba(20, 24, 50, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            max-width: 360px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(140, 100, 255, 0.3);
            animation: fadeSlideUp 0.5s ease;
        }
        .brand-horror {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            text-align: center;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        .video-eye {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #000;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .video-eye video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 40px;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #b07eff;
            box-shadow: 0 0 0 3px rgba(176, 126, 255, 0.2);
        }
        .input-group input::placeholder {
            color: #b9beff;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: scale(0.98);
        }
        .login-error {
            color: #ffae9e;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 14px;
        }

        /* Main App */
        .main-app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .bottom-nav {
            background: rgba(15, 18, 40, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 20px 12px;
            border-top: 1px solid rgba(176, 126, 255, 0.35);
            border-radius: 28px 28px 0 0;
            transition: background 0.4s ease;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ccd0ff;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-item i {
            font-size: 1.6rem;
        }
        .nav-item.active {
            color: #dbbaff;
            background: rgba(122, 92, 255, 0.3);
        }
        .nav-item:hover i {
            transform: translateY(-2px);
        }

        /* Home Page */
        .center-card {
            text-align: center;
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            padding: 32px 20px;
            border-radius: 32px;
            max-width: 320px;
            margin: 40px auto;
            border: 1px solid rgba(176, 126, 255, 0.4);
            transition: all 0.3s ease;
        }
        .welcome-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #dbbaff;
            margin-bottom: 16px;
        }
        .center-card h2 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(120deg, #f0eaff, #cfb3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .center-card p {
            color: #e2e6ff;
        }

        /* World Clock */
        .world-clock-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .region-section {
            margin-bottom: 24px;
        }
        .region-title {
            font-size: 1rem;
            font-weight: 700;
            color: #dbbaff;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #b07eff;
        }
        .cities-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .city-card {
            background: rgba(20, 24, 50, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 18px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-info {
            flex: 1;
        }
        .city-name {
            font-weight: 700;
            font-size: 1rem;
            color: #f0f2ff;
            margin-bottom: 4px;
        }
        .city-time {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e6c8ff, #b07eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Inter', monospace;
        }
        .city-date {
            font-size: 0.65rem;
            color: #a5a9ce;
            margin-top: 3px;
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 380px;
            margin: 30px auto;
            border: 1px solid rgba(176, 126, 255, 0.4);
            transition: all 0.3s ease;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .setting-row:last-child {
            border-bottom: none;
        }
        .setting-label {
            font-weight: 600;
            color: #f0f2ff;
            font-size: 0.95rem;
        }
        .version-badge {
            background: #2a2f58;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            transition: background 0.4s ease;
        }
        .changelog-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .changelog-title {
            font-weight: 700;
            color: #dbbaff;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .changelog-list {
            list-style: none;
            padding-left: 8px;
        }
        .changelog-list li {
            color: #ccd0ff;
            font-size: 0.8rem;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .changelog-list li i {
            font-size: 0.7rem;
            color: #7a5cff;
            width: 18px;
        }
        
        /* Modern Dropdown */
        .theme-dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .theme-dropbtn {
            width: 100%;
            background: linear-gradient(135deg, rgba(20, 24, 50, 0.9), rgba(30, 35, 70, 0.9));
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0, 255, 255, 0.5);
            color: cyan;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .theme-dropbtn i {
            transition: transform 0.3s ease;
        }

        .theme-dropdown:hover .theme-dropbtn {
            background: rgba(0, 255, 255, 0.2);
            border-color: cyan;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .theme-dropdown-content {
            position: absolute;
            top: 120%;
            left: 0;
            right: 0;
            background: rgba(10, 10, 30, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 0.5rem 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
            z-index: 100;
        }

        .theme-dropdown:hover .theme-dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.25s;
            border-left: 3px solid transparent;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .theme-option i {
            width: 20px;
            font-size: 1rem;
        }

        .theme-option:hover {
            background: rgba(0, 255, 255, 0.15);
            color: cyan;
            border-left-color: cyan;
            padding-left: 22px;
        }

        .theme-option.selected {
            background: rgba(0, 255, 255, 0.2);
            color: cyan;
            border-left-color: cyan;
        }
        
        .logout-btn {
            width: 100%;
            background: linear-gradient(95deg, rgba(220, 70, 70, 0.85), rgba(180, 50, 50, 0.95));
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logout-btn:hover {
            transform: scale(0.98);
        }

        /* Code Scraper Page - Full integration */
        .code-scraper-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .scraper-card {
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(176, 126, 255, 0.3);
            margin-bottom: 20px;
        }
        .scraper-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .scraper-badge {
            display: inline-block;
            background: rgba(122, 92, 255, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #b07eff;
            margin-bottom: 12px;
        }
        .scraper-header h3 {
            color: #e2e6ff;
            font-size: 1.3rem;
        }
        .scraper-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .scraper-url-wrapper {
            flex: 1;
            position: relative;
        }
        .scraper-url-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b07eff;
        }
        .scraper-url-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(12, 16, 35, 0.9);
            border: 1px solid rgba(140, 100, 255, 0.5);
            border-radius: 40px;
            font-size: 0.85rem;
            color: white;
            outline: none;
        }
        .scraper-url-input:focus {
            border-color: #b07eff;
        }
        .scraper-btn {
            background: linear-gradient(95deg, #7a5cff, #b07eff);
            border: none;
            padding: 0 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        .scraper-loading {
            margin-top: 15px;
            display: none;
        }
        .scraper-loading-bar {
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            height: 6px;
            overflow: hidden;
        }
        .scraper-loading-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7a5cff, #b07eff);
            border-radius: 50px;
            transition: width 0.3s;
        }
        .scraper-result {
            margin-top: 20px;
            display: none;
        }
        .scraper-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .scraper-result-actions {
            display: flex;
            gap: 8px;
        }
        .scraper-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .scraper-action-btn:hover {
            background: rgba(122, 92, 255, 0.5);
        }
        .scraper-pre {
            background: #0a0e1a;
            border-radius: 16px;
            padding: 15px;
            overflow-x: auto;
            max-height: 400px;
            font-size: 0.7rem;
            font-family: monospace;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .scraper-error {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
            padding: 12px;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 550px) {
            body { padding: 10px; }
            .app-container { height: 95vh; border-radius: 28px; }
            .brand-horror { font-size: 2.4rem; }
            .city-time { font-size: 1.1rem; }
            .city-name { font-size: 0.9rem; }
            .nav-item { padding: 6px 8px; }
            .nav-item i { font-size: 1.3rem; }
            .nav-item span { font-size: 0.6rem; }
            .scraper-input-group { flex-direction: column; }
            .scraper-btn { padding: 10px; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="wave-bg">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="app-container" id="appContainer">
        <div id="loginPage" class="login-page">
            <div class="login-card">
                <div class="brand-horror">BRQ Hub</div>
                <div class="video-eye">
                    <video autoplay muted loop playsinline id="eyeVideo">
                        <source src="eye.mp4" type="video/mp4">
                    </video>
                </div>
                <form id="loginForm" action="javascript:void(0);">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                    <div id="loginErrorMsg" class="login-error"></div>
                </form>
            </div>
        </div>

        <div id="mainApp" class="main-app hidden">
            <div class="content-scroll" id="pageContent"></div>
            <div class="bottom-nav">
                <button class="nav-item" id="homeNavBtn"><i class="fas fa-compass"></i><span>Home</span></button>
                <button class="nav-item" id="worldClockNavBtn"><i class="fas fa-globe"></i><span>World Clock</span></button>
                <button class="nav-item" id="codeScraperNavBtn"><i class="fas fa-file-code"></i><span>Code Scraper</span></button>
                <button class="nav-item" id="settingsNavBtn"><i class="fas fa-sliders-h"></i><span>Settings</span></button>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`;

        const themes = {
            "Default": { name: "🌙 Default", icon: "fa-moon", containerBg: "rgba(8, 12, 28, 0.55)", navBg: "rgba(15, 18, 40, 0.9)", cardBg: "rgba(20, 24, 50, 0.7)", accent: "#b07eff" },
            "Dark Purple": { name: "🟣 Dark Purple", icon: "fa-gem", containerBg: "rgba(35, 20, 55, 0.55)", navBg: "rgba(45, 30, 70, 0.9)", cardBg: "rgba(55, 35, 85, 0.7)", accent: "#c88eff" },
            "Dark Blue": { name: "🔵 Dark Blue", icon: "fa-water", containerBg: "rgba(10, 35, 65, 0.55)", navBg: "rgba(12, 40, 75, 0.9)", cardBg: "rgba(15, 45, 80, 0.7)", accent: "#6a9eff" },
            "Midnight Violet": { name: "🌌 Midnight Violet", icon: "fa-star", containerBg: "rgba(35, 28, 80, 0.55)", navBg: "rgba(45, 35, 95, 0.9)", cardBg: "rgba(55, 45, 110, 0.7)", accent: "#c58aff" },
            "Deep Emerald": { name: "🍃 Deep Emerald", icon: "fa-leaf", containerBg: "rgba(10, 55, 40, 0.55)", navBg: "rgba(15, 70, 50, 0.9)", cardBg: "rgba(20, 85, 60, 0.7)", accent: "#5fe0b0" }
        };
        
        let currentTheme = "Default";
        
        function applyTheme(themeKey) {
            const t = themes[themeKey];
            if (!t) return;
            document.getElementById('appContainer').style.background = t.containerBg;
            const nav = document.querySelector('.bottom-nav');
            if (nav) nav.style.background = t.navBg;
            document.querySelectorAll('.center-card, .settings-panel, .city-card, .login-card, .scraper-card').forEach(card => {
                if (card) { card.style.background = t.cardBg; card.style.borderColor = t.accent + '80'; }
            });
            document.querySelectorAll('.version-badge').forEach(b => { if(b) b.style.background = t.accent + '40'; });
        }

        const indonesiaCities = [
            { name: "Jakarta", timezone: "Asia/Jakarta" }, { name: "Bali", timezone: "Asia/Makassar" },
            { name: "Surabaya", timezone: "Asia/Jakarta" }, { name: "Medan", timezone: "Asia/Jakarta" },
            { name: "Bandung", timezone: "Asia/Jakarta" }, { name: "Makassar", timezone: "Asia/Makassar" },
            { name: "Semarang", timezone: "Asia/Jakarta" }, { name: "Palembang", timezone: "Asia/Jakarta" },
            { name: "Yogyakarta", timezone: "Asia/Jakarta" }, { name: "Malang", timezone: "Asia/Jakarta" },
            { name: "Pontianak", timezone: "Asia/Pontianak" }, { name: "Jayapura", timezone: "Asia/Jayapura" }
        ];
        
        const internationalCountries = [
            { name: "Amerika Serikat", timezone: "America/New_York" }, { name: "Inggris", timezone: "Europe/London" },
            { name: "Jepang", timezone: "Asia/Tokyo" }, { name: "Australia", timezone: "Australia/Sydney" },
            { name: "Uni Emirat Arab", timezone: "Asia/Dubai" }, { name: "China", timezone: "Asia/Shanghai" },
            { name: "Singapura", timezone: "Asia/Singapore" }, { name: "Malaysia", timezone: "Asia/Kuala_Lumpur" },
            { name: "Thailand", timezone: "Asia/Bangkok" }, { name: "Korea Selatan", timezone: "Asia/Seoul" },
            { name: "India", timezone: "Asia/Kolkata" }, { name: "Prancis", timezone: "Europe/Paris" },
            { name: "Jerman", timezone: "Europe/Berlin" }, { name: "Italia", timezone: "Europe/Rome" }
        ];
        
        function getTimeForTimezone(timezone) {
            try { return new Date().toLocaleTimeString('id-ID', { timeZone: timezone, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
            catch(e) { return new Date().toLocaleTimeString('id-ID'); }
        }
        
        function getDateForTimezone(timezone) {
            try { return new Date().toLocaleDateString('id-ID', { timeZone: timezone, weekday: 'short', day: 'numeric', month: 'short' }); }
            catch(e) { return new Date().toLocaleDateString('id-ID'); }
        }
        
        function renderWorldClock() {
            const container = document.getElementById('worldClockContainer');
            if (!container) return;
            let html = `<div class="region-section"><div class="region-title"><i class="fas fa-map-marker-alt"></i> 🇮🇩 Indonesia</div><div class="cities-list">`;
            indonesiaCities.forEach(city => { html += `<div class="city-card"><div class="city-info"><div class="city-name">📍 ${city.name}</div><div class="city-time">${getTimeForTimezone(city.timezone)}</div><div class="city-date">${getDateForTimezone(city.timezone)}</div></div></div>`; });
            html += `</div></div><div class="region-section"><div class="region-title"><i class="fas fa-globe-asia"></i> 🌏 Luar Negeri</div><div class="cities-list">`;
            internationalCountries.forEach(country => { html += `<div class="city-card"><div class="city-info"><div class="city-name">🌏 ${country.name}</div><div class="city-time">${getTimeForTimezone(country.timezone)}</div><div class="city-date">${getDateForTimezone(country.timezone)}</div></div></div>`; });
            html += `</div></div>`;
            container.innerHTML = html;
        }
        
        let clockInterval;
        function startClockUpdate() {
            if (clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => { if (activePage === 'worldclock') renderWorldClock(); }, 1000);
        }
        
        // Code Scraper Logic
        let currentSourceCode = '';
        let scraperInterval = null;
        let scraperProgress = 0;
        let isFetching = false;
        
        function showScraperToast(msg, isError = false) {
            const toast = document.getElementById('scraperToast');
            if (toast) {
                toast.textContent = msg;
                toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
                toast.style.display = 'flex';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            } else {
                alert(msg);
            }
        }
        
        function updateScraperProgress(percent, message) {
            scraperProgress = percent;
            const bar = document.getElementById('scraperProgressBar');
            const percentEl = document.getElementById('scraperPercent');
            const msgEl = document.getElementById('scraperMessage');
            if (bar) bar.style.width = percent + '%';
            if (percentEl) percentEl.textContent = Math.floor(percent) + '%';
            if (msgEl) msgEl.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message}`;
        }
        
        function startScraperLoading() {
            const loadingDiv = document.getElementById('scraperLoading');
            if (loadingDiv) loadingDiv.style.display = 'block';
            scraperProgress = 0;
            updateScraperProgress(0, 'Memulai...');
            if (scraperInterval) clearInterval(scraperInterval);
            scraperInterval = setInterval(() => {
                if (scraperProgress < 90 && isFetching) {
                    updateScraperProgress(Math.min(scraperProgress + 5, 90), 'Mengambil data...');
                }
            }, 200);
        }
        
        function stopScraperLoading(success) {
            isFetching = false;
            if (scraperInterval) { clearInterval(scraperInterval); scraperInterval = null; }
            const loadingDiv = document.getElementById('scraperLoading');
            if (loadingDiv) loadingDiv.style.display = 'none';
        }
        
        async function fetchSourceCode() {
            if (isFetching) return;
            const urlInput = document.getElementById('scraperUrl');
            let url = urlInput.value.trim();
            if (!url) { showScraperToast('Masukkan URL!', true); return; }
            if (!url.startsWith('http')) url = 'https://' + url;
            urlInput.value = url;
            
            const errorDiv = document.getElementById('scraperError');
            const resultDiv = document.getElementById('scraperResult');
            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';
            currentSourceCode = '';
            
            isFetching = true;
            startScraperLoading();
            
            try {
                updateScraperProgress(20, 'Validasi URL...');
                await new Promise(r => setTimeout(r, 200));
                updateScraperProgress(40, 'Menghubungi proxy...');
                const proxyUrl = PROXY_URL(url);
                const response = await fetch(proxyUrl);
                updateScraperProgress(70, 'Menerima response...');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                updateScraperProgress(90, 'Memproses...');
                if (!html || html.length < 50) throw new Error('Source code kosong');
                currentSourceCode = html;
                document.getElementById('scraperSourceCode').textContent = html;
                const stats = document.getElementById('scraperStats');
                stats.innerHTML = `<i class="fas fa-database"></i> Ukuran: ${(html.length/1024).toFixed(2)} KB | <i class="fas fa-code"></i> Karakter: ${html.length.toLocaleString()}`;
                resultDiv.style.display = 'block';
                updateScraperProgress(100, 'Selesai!');
                setTimeout(() => stopScraperLoading(true), 300);
                showScraperToast('Berhasil mengambil source code!');
            } catch(err) {
                stopScraperLoading(false);
                errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Gagal: ${err.message}<br><small>Tips: Coba URL lain seperti https://example.com</small>`;
                errorDiv.style.display = 'block';
                showScraperToast(err.message, true);
            }
        }
        
        function copyScraperCode() {
            if (!currentSourceCode) { showScraperToast('Tidak ada source code!', true); return; }
            navigator.clipboard.writeText(currentSourceCode).then(() => showScraperToast('Copied!'));
        }
        
        function downloadScraperCode() {
            if (!currentSourceCode) { showScraperToast('Tidak ada source code!', true); return; }
            const blob = new Blob([currentSourceCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `source_${Date.now()}.html`;
            a.click();
            URL.revokeObjectURL(a.href);
            showScraperToast('Download dimulai');
        }
        
        function clearScraperCode() {
            currentSourceCode = '';
            document.getElementById('scraperUrl').value = '';
            document.getElementById('scraperResult').style.display = 'none';
            document.getElementById('scraperError').style.display = 'none';
            showScraperToast('Dibersihkan');
        }
        
        function renderCodeScraper() {
            return `
                <div class="code-scraper-container">
                    <div class="scraper-card">
                        <div class="scraper-header">
                            <div class="scraper-badge"><i class="fas fa-code"></i> Web Scraper Tool</div>
                            <h3><i class="fas fa-file-code"></i> SourceCode Grabber</h3>
                        </div>
                        <div class="scraper-input-group">
                            <div class="scraper-url-wrapper">
                                <i class="fas fa-link scraper-url-icon"></i>
                                <input type="url" id="scraperUrl" class="scraper-url-input" placeholder="https://example.com" value="https://example.com">
                            </div>
                            <button class="scraper-btn" id="scraperFetchBtn"><i class="fas fa-magic"></i> Extract</button>
                        </div>
                        <div class="scraper-loading" id="scraperLoading">
                            <div class="scraper-loading-bar"><div class="scraper-loading-progress" id="scraperProgressBar"></div></div>
                            <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; color: #a5a9ce;">
                                <span id="scraperMessage">Memulai...</span>
                                <span id="scraperPercent">0%</span>
                            </div>
                        </div>
                        <div class="scraper-error" id="scraperError"></div>
                        <div class="scraper-result" id="scraperResult">
                            <div class="scraper-result-header">
                                <span><i class="fas fa-code-branch"></i> Source Code</span>
                                <div class="scraper-result-actions">
                                    <button class="scraper-action-btn" id="scraperCopyBtn"><i class="fas fa-copy"></i> Copy</button>
                                    <button class="scraper-action-btn" id="scraperDownloadBtn"><i class="fas fa-download"></i> Download</button>
                                    <button class="scraper-action-btn" id="scraperClearBtn"><i class="fas fa-trash"></i> Clear</button>
                                </div>
                            </div>
                            <pre class="scraper-pre" id="scraperSourceCode"></pre>
                            <div class="scraper-stats" id="scraperStats" style="margin-top: 12px; font-size: 0.7rem; color: #a5a9ce;"></div>
                        </div>
                    </div>
                    <div class="scraper-card" style="text-align: center;">
                        <small style="color: #a5a9ce;">Made with <i class="fas fa-heart" style="color: #ef4444;"></i> by BRQ Hub</small>
                    </div>
                </div>
                <div id="scraperToast" style="position: fixed; bottom: 80px; right: 20px; background: #10b981; color: white; padding: 10px 20px; border-radius: 12px; display: none; align-items: center; gap: 8px; z-index: 1000; font-size: 0.8rem;"></div>
            `;
        }

        const loginPageDiv = document.getElementById('loginPage');
        const mainAppDiv = document.getElementById('mainApp');
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('loginErrorMsg');
        const pageContentDiv = document.getElementById('pageContent');
        const homeBtn = document.getElementById('homeNavBtn');
        const worldClockBtn = document.getElementById('worldClockNavBtn');
        const codeScraperBtn = document.getElementById('codeScraperNavBtn');
        const settingsBtn = document.getElementById('settingsNavBtn');

        function doLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (username === "admin" && password === "1234") {
                errorMsg.innerText = "";
                loginPageDiv.classList.add('hidden');
                mainAppDiv.classList.remove('hidden');
                startClockUpdate();
                loadPage('home');
            } else {
                errorMsg.innerText = "Username atau password salah!";
            }
        }
        loginForm.addEventListener('submit', doLogin);

        function logout() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            errorMsg.innerText = '';
            if (clockInterval) clearInterval(clockInterval);
            mainAppDiv.classList.add('hidden');
            loginPageDiv.classList.remove('hidden');
            document.getElementById('eyeVideo')?.play().catch(() => {});
        }

        let activePage = 'home';
        function setActiveNavButton(page) {
            homeBtn.classList.remove('active');
            worldClockBtn.classList.remove('active');
            codeScraperBtn.classList.remove('active');
            settingsBtn.classList.remove('active');
            if (page === 'home') homeBtn.classList.add('active');
            else if (page === 'worldclock') worldClockBtn.classList.add('active');
            else if (page === 'codescraper') codeScraperBtn.classList.add('active');
            else if (page === 'settings') settingsBtn.classList.add('active');
        }

        function renderHome() {
            return `<div class="page-content"><div class="center-card"><div class="welcome-text">👋 Welcome, admin!</div><h2>📱 APP dalam pengembangan</h2><p>Fitur menarik segera hadir</p></div></div>`;
        }
        
        function renderWorldClockPage() {
            return `<div class="world-clock-container"><div id="worldClockContainer"></div></div>`;
        }

        function renderCodeScraperPage() {
            return renderCodeScraper();
        }

        function renderSettings() {
            const themeOptions = Object.keys(themes).map(key => `
                <div class="theme-option" data-theme="${key}">
                    <i class="fas ${themes[key].icon}"></i>
                    <span>${themes[key].name}</span>
                </div>
            `).join('');
            return `
                <div class="page-content">
                    <div class="settings-panel">
                        <div class="setting-row"><span class="setting-label">Versi aplikasi</span><span class="version-badge">1.3</span></div>
                        <div class="setting-row">
                            <span class="setting-label">Theme settings</span>
                            <div class="theme-dropdown">
                                <button class="theme-dropbtn" id="themeDropBtn"><span><i class="fas ${themes[currentTheme].icon}"></i> ${themes[currentTheme].name}</span><i class="fas fa-chevron-down"></i></button>
                                <div class="theme-dropdown-content" id="themeDropdownContent">${themeOptions}</div>
                            </div>
                        </div>
                        <div class="changelog-section">
                            <div class="changelog-title"><i class="fas fa-history"></i> Changelog v1.3</div>
                            <ul class="changelog-list">
                                <li><i class="fas fa-globe"></i> World Clock 50+ lokasi dunia</li>
                                <li><i class="fas fa-city"></i> Pemisahan bagan Indonesia & Luar Negeri</li>
                                <li><i class="fas fa-user"></i> Welcome admin di halaman Home</li>
                                <li><i class="fas fa-file-code"></i> Fitur Code Scraper (ambil source code website)</li>
                                <li><i class="fas fa-palette"></i> 5 pilihan theme menarik</li>
                                <li><i class="fas fa-clock"></i> Update waktu real-time setiap detik</li>
                                <li><i class="fas fa-water"></i> Background wave animasi bergerak smooth</li>
                            </ul>
                        </div>
                        <div class="setting-row" style="border-bottom: none; padding-top: 20px;">
                            <button id="logoutButton" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function loadPage(page) {
            activePage = page;
            if (page === 'home') {
                pageContentDiv.innerHTML = renderHome();
                setActiveNavButton('home');
            } else if (page === 'worldclock') {
                pageContentDiv.innerHTML = renderWorldClockPage();
                setActiveNavButton('worldclock');
                renderWorldClock();
            } else if (page === 'codescraper') {
                pageContentDiv.innerHTML = renderCodeScraperPage();
                setActiveNavButton('codescraper');
                setTimeout(() => {
                    document.getElementById('scraperFetchBtn')?.addEventListener('click', fetchSourceCode);
                    document.getElementById('scraperCopyBtn')?.addEventListener('click', copyScraperCode);
                    document.getElementById('scraperDownloadBtn')?.addEventListener('click', downloadScraperCode);
                    document.getElementById('scraperClearBtn')?.addEventListener('click', clearScraperCode);
                    document.getElementById('scraperUrl')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') fetchSourceCode(); });
                }, 100);
            } else if (page === 'settings') {
                pageContentDiv.innerHTML = renderSettings();
                setActiveNavButton('settings');
                const themeOptions = document.querySelectorAll('.theme-option');
                themeOptions.forEach(option => {
                    option.addEventListener('click', (e) => {
                        const newTheme = option.dataset.theme;
                        if (newTheme && themes[newTheme]) {
                            currentTheme = newTheme;
                            applyTheme(currentTheme);
                            loadPage('settings');
                        }
                    });
                });
                document.getElementById('logoutButton')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            }
            if (pageContentDiv) pageContentDiv.scrollTop = 0;
        }

        homeBtn.addEventListener('click', () => { if (activePage !== 'home') loadPage('home'); });
        worldClockBtn.addEventListener('click', () => { if (activePage !== 'worldclock') loadPage('worldclock'); });
        codeScraperBtn.addEventListener('click', () => { if (activePage !== 'codescraper') loadPage('codescraper'); });
        settingsBtn.addEventListener('click', () => { if (activePage !== 'settings') loadPage('settings'); });

        document.getElementById('eyeVideo')?.addEventListener('error', function() { this.style.background = "#11152e"; });
        document.getElementById('eyeVideo')?.play().catch(() => {});
        applyTheme('Default');
    </script>
</body>
</html>
